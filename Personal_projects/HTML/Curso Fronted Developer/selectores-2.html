<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div p {
            color: lime;
        }
        div > div {
            background-color:plum;
        }
        .es {
            background-color:  red;
        }
        div + section{
            background-color: palevioletred;
        }
        div ~ p {
            color: powderblue;
        }
    </style>
</head>
<body>
    <div>
       <div>
        <p>platzi</p>
        <div class="es">es</div>
       </div>
    </div>
    <div>
        <div>
            master
        </div>
        <section>es lo mejor</section>
        <p>clase</p>
    </div>
</body>
</html>
