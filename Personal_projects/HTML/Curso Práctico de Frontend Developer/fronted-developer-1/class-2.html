<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <title>BotaFora</title>
    <style>
        :root {
            --very-light-pink: #C7C7C7;
            --text-input-field: #F7F7F7;
            --hospital-green: #ACD9B2;
            --withe: #FFFFFF;
            --black: #000000;
            --sm: 18px;
            --md: 22px;
            --lg: 30px;
        }

        .nav-1 {
            width: 100vw;
            height: 10vh;
            background-color: #ffffff;
            box-shadow: 10px 10px 100px -3px#C7C7C7;
            left: 0;
            top: 0;
            position: fixed;
        }

        .logo-nav {
            margin: 14px;
            width: 280px;
            margin-bottom: 48px;
            justify-self: left;
        }

        body {
            margin: 0;
            font-family: "Quicksand", sans-serif;
        }

        .login {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
        }

        .form-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            width: 500px;
            transform: translateX(-50px);
            transform: translatey(50px);
            
        }

        .logo {
            width: 400px;
            margin-top: 50px;
            margin-bottom: 0px;
            justify-self: center;
            /*display: none;*/
        }

        .titule {
            font-size: var(--lg);
            margin-bottom: 12px;
            text-align: center;
        }

        .subtitle {
            color: var(--very-light-pink);
            font-size: var(--md);
            font-weight: 300;
            margin-top: 20px;
            margin-bottom: -50px;
            text-align: center;
        }
        .email-image{
            display: flex;
            width: 200px;            
            height: 200px;
            border-radius: 50%;
            background-color: var(--text-input-field);
            justify-content: center;
            align-items: center;
            font-size: 100px;
            margin: 0 auto;
            margin-top: 100px;
            
        }
        .email-image img{
            width: 130px;
        }
        .primary-button {
            background-color: var(--hospital-green);
            border-radius: 8px;
            border: none;
            color: var(--withe);
            width: 100%;
            height: 54px;
            cursor: pointer;
            font-size: var(--lg);
            font-weight: bold;
        }

        .login-button {
            margin-top: 60px;
            margin-bottom: 40px;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        .login-button:hover {
            transform: scale(1.1); 
            background-color: #97c99c; 
            box-shadow: 0 8px 20px var(--very-light-pink);
        }
        .resend {
            font-size: var(--md);
        }
        .resend span{
            color: var(--very-light-pink);
        }
        .resend a {
            color: var(--hospital-green);
            text-decoration: none;
        }
    </style>
    <link rel="stylesheet" href="cel-class2.css">
</head>

<body>
    <nav class="nav-1">
        <img src="/Curso Práctico de Frontend Developer/curso-frontend-developer-practico-main/logos/logo_bota_fora.svg"
            alt="logo" class="logo-nav">
    </nav>

    <div class="login">
        <div class="form-container">
            <img src="/Curso Práctico de Frontend Developer/curso-frontend-developer-practico-main/logos/logo_bota_fora.svg"
                alt="logo" class="logo">

            <h1 class="titule">Email has been sent!</h1>
            <p class="subtitle">Please check your inbox for instructions on how to reset the password</p>

            <div class="email-image">
                <img src="/Curso Práctico de Frontend Developer/curso-frontend-developer-practico-main/icons/email.svg" alt="">
            </div>
            <form action="./class-3.html">
                <button class="primary-button login-button">login</button>
            </form>
            <p class="resend">
                <span>Didn't receive the email?</span>
                <a href="/">Resend</a>
            </p>
        </div>
    </div>
</body>

</html>
