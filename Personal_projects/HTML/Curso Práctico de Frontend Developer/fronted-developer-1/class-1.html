<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <title>BotaFora</title>
    <style>
        :root{
            --very-light-pink: #C7C7C7;
            --text-input-field: #F7F7F7;
            --hospital-green: #ACD9B2;
            --withe: #FFFFFF;
            --black: #000000;
            --sm: 18px;
            --md: 22px;
            --lg: 30px;
        }
        .nav-1{
            width: 100vw;
            height: 10vh;
            background-color: #ffffff;
            box-shadow: 10px 10px 100px -3px#C7C7C7;
            left: 0;
            top: 0;
            position: fixed;
        }
        .logo-nav{
          margin: 14px;
          width: 280px;
          margin-bottom: 48px;
          justify-self: left;
        }
        body{
            margin: 0;
            font-family: "Quicksand", sans-serif;
        }
        .login{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
        }
        .form-container{
            display: grid;
            grid-template-rows: auto 1fr auto;
            width: 500px;
            transform: translateX(-50px);
            transform: translatey(60px);
        }
        .logo{
          width: 400px;
          margin-bottom: 48px;
          justify-self: center;
          /*display: none;*/
        }
        .titule{
            font-size: var(--lg);
            margin-bottom: 12px;
            text-align: center;
        }
        .subtitle{
            color: var(--very-light-pink);
            font-size: var(--md);
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 32px;
            text-align: center;
        }
        .form{
            display: flex;
            flex-direction: column;
        }
        .label{
            font-size: var(--sm);
            font-weight: bold;
            margin-bottom: 4px;
        }
        .input{
            background-color: var(--text-input-field);
            border: none;
            border-radius: 8px;
            height: 30px;
            font-size: var(--md);
            padding: 6px;
            margin-bottom: 12px;
        }
        .primary-button{
            background-color: var(--hospital-green);
            border-radius: 8px;
            border: none;
            color: var(--withe);
            width: 100%;
            height: 54px;
            cursor: pointer;
            font-size: var(--lg);
            font-weight: bold;
        }
        .login-button{
            margin-top: 14px;
            margin-bottom: 30px;
        }
    </style>
    <link rel="stylesheet" href="cel.css">
</head>
<body>
        <nav class="nav-1">
           <img src="/Curso Práctico de Frontend Developer/curso-frontend-developer-practico-main/logos/logo_bota_fora.svg"
           alt="logo" class="logo-nav">
        </nav>

    <div class="login">
        <div class="form-container">
            <img src="/Curso Práctico de Frontend Developer/curso-frontend-developer-practico-main/logos/logo_bota_fora.svg" alt="logo" class="logo">

            <h1 class="titule">Create a new password</h1>
            <p class="subtitle">Enter a new password for your account</p>

            <form action="" class="form">
               <label for="password" class="label">Password</label>
                <input type="password" id="password" placeholder="Password" class="input input-password">
            </form>

            <form action="" class="form">
                <label for="new password" class="label">Enter again the password</label>
                <input type="password" id="new-password" placeholder="new password" class="input input-password">
                
                <input type="submit" value="Confirm" class="primary-button login-button">
            </form>
        </div>
    </div>
</body>
</html>
